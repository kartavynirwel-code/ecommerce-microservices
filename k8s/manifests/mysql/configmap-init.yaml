apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS auth_db;
    CREATE DATABASE IF NOT EXISTS product_db;
    CREATE DATABASE IF NOT EXISTS order_db;
    CREATE DATABASE IF NOT EXISTS cart_db;

    CREATE USER IF NOT EXISTS 'auth_user'@'%' IDENTIFIED BY 'SomePassword123';
    CREATE USER IF NOT EXISTS 'product_user'@'%' IDENTIFIED BY 'SomePassword123';
    CREATE USER IF NOT EXISTS 'order_user'@'%' IDENTIFIED BY 'SomePassword123';
    CREATE USER IF NOT EXISTS 'cart_user'@'%' IDENTIFIED BY 'SomePassword123';

    GRANT ALL PRIVILEGES ON auth_db.* TO 'auth_user'@'%';
    GRANT ALL PRIVILEGES ON product_db.* TO 'product_user'@'%';
    GRANT ALL PRIVILEGES ON order_db.* TO 'order_user'@'%';
    GRANT ALL PRIVILEGES ON cart_db.* TO 'cart_user'@'%';

    FLUSH PRIVILEGES;