replicaCount: 2

image:
  repository: kartavyanirwel/ecommerce-cart-service
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8000

secretEnv:
  - DB_USER
  - DB_PASSWORD
  - JWT_SECRET

configEnv:
  DB_HOST: mysql-service
  DB_PORT: "3306"
  DB_NAME: cart_db
  JWT_ALGORITHM: "HS256"
  CORS_ALLOWED_ORIGINS: "https://your-frontend-domain.com"
  PRODUCT_SERVICE_URL: "http://product-service-mychart:8082"

livenessProbe:
  httpGet:
    path: /health
    port: http
readinessProbe:
  httpGet:
    path: /health
    port: http
