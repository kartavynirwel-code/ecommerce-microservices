replicaCount: 2

image:
  repository: kartavyanirwel/ecommerce-product-service
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8082

secretEnv:
  - DB_USER
  - DB_PASSWORD
  - JWT_SECRET

configEnv:
  DB_HOST: mysql-service
  DB_PORT: "3306"
  DB_NAME: product_db
  CORS_ALLOWED_ORIGINS: "https://your-frontend-domain.com"

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
