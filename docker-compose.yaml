services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: ${AUTH_SERVER_PORT}
      DB_HOST: mysql
      DB_PORT: ${MYSQL_PORT}
      DB_NAME: ${AUTH_DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      JWT_ISSUER: ${JWT_ISSUER}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      mysql:
        condition: service_healthy

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: ${PRODUCT_SERVER_PORT}
      DB_HOST: mysql
      DB_PORT: ${MYSQL_PORT}
      DB_NAME: ${PRODUCT_DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      mysql:
        condition: service_healthy

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      SERVER_PORT: ${ORDER_SERVER_PORT}
      DB_HOST: mysql
      DB_PORT: ${MYSQL_PORT}
      DB_NAME: ${ORDER_DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      mysql:
        condition: service_healthy

  cart-service:
    build:
      context: ./cart-service
      dockerfile: Dockerfile
    container_name: cart-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SERVER_PORT: ${CART_SERVER_PORT}
      DB_HOST: mysql
      DB_PORT: ${MYSQL_PORT}
      DB_NAME: ${CART_DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      PRODUCT_SERVICE_URL: http://product-service:8082
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_AUTH_SERVICE_URL: ${VITE_AUTH_SERVICE_URL}
      VITE_PRODUCT_SERVICE_URL: ${VITE_PRODUCT_SERVICE_URL}
      VITE_ORDER_SERVICE_URL: ${VITE_ORDER_SERVICE_URL}
      VITE_CART_SERVICE_URL: ${VITE_CART_SERVICE_URL}
    depends_on:
      - auth-service
      - cart-service
      - product-service
      - order-service

volumes:
  mysql_data: